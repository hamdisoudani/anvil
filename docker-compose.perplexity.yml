# Anvil Perplexity — production deployment
#
# One container. Set ANTHROPIC_API_KEY (required) and optionally
# BRAVE_API_KEY. Exposes 8081.
#
# Deploy:
#   railway up
#   fly launch && fly deploy
#   docker compose up
#   vercel deploy  (with the @vercel/go builder — see vercel.json below)

services:
  perplexity:
    build:
      context: .
      dockerfile: Dockerfile.perplexity
    ports:
      - "8081:8081"
    environment:
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      BRAVE_API_KEY: ${BRAVE_API_KEY}
      # Optional: rate limit, plan tier
      # PLAN_TIER: pro
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "-", "http://localhost:8081/"]
      interval: 30s
      timeout: 3s
      retries: 3
